services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chating
      POSTGRES_PASSWORD: chating
      POSTGRES_DB: chating
    volumes:
      - chating_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chating -d chating"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Секреты — из backend/.env (секреты не в образе, см. .dockerignore)
    env_file:
      - ./backend/.env
    environment:
      # Всегда БД в Docker — перекрываем sqlite из backend/.env
      DATABASE_URL: postgresql+asyncpg://chating:chating@db:5432/chating
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      # Иначе после пересборки контейнера фото моделей пропадают, а строки в Postgres остаются → 404 на /public-model-image
      - chating_app_data:/app/backend/data

volumes:
  chating_pg:
  chating_app_data:
