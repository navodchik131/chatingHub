map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 64m;

    location /api/ws {
        proxy_pass http://api:8080/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /public-model-image/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
    }

    # Host nginx: location /workspace/ { proxy_pass http://frontend/; } — префикс /workspace/ срезается.
    # Браузер: /workspace/workflow/ → сюда приходит /workflow/

    location = /workflow {
        return 301 /workflow/;
    }

    location ^~ /workflow/ {
        root /usr/share/nginx/html/workspace;
        try_files $uri $uri/ /workflow/index.html;
    }

    # Кабинет SPA: /workspace/ → /, /workspace/images → /images, …
    location / {
        try_files $uri $uri/ /index.html;
    }
}
