# ModelMate — production (Docker api :8080 + frontend :5180)
# Установка на сервере:
#   sudo cp deploy/nginx-model-mate.online.conf /etc/nginx/sites-available/model-mate.online
#   sudo ln -sf /etc/nginx/sites-available/model-mate.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Маркетинг + workflow: https://model-mate.online/
# Новый кабинет OS:      https://model-mate.online/workspace/

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream modelmate_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream modelmate_os {
    server 127.0.0.1:5180;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name model-mate.online www.model-mate.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name model-mate.online www.model-mate.online;

    client_max_body_size 64m;

    ssl_certificate     /etc/letsencrypt/live/model-mate.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/model-mate.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /api/webhooks/fanvue {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /api/integrations/fanvue/oauth/callback {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/webhooks/(fanvue|telegram|tribute)/ {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /api/billing/tribute/webhook {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- WebSocket (кабинет) ---
    location /api/ws {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- студия: долгие запросы ---
    location /api/studio/ {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- кабинет + workflow (отдельная сборка в frontend-контейнере) ---
    location = /workspace/workflow {
        return 301 https://$host/workspace/workflow/;
    }

    location /workspace/ {
        proxy_pass http://modelmate_os/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /workspace {
        return 301 https://$host/workspace/;
    }

    # редирект со старого пути /os/
    location = /os {
        return 301 https://$host/workspace/;
    }

    location /os/ {
        return 301 https://$host/workspace/;
    }

    # --- API ---
    location /api/ {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /public-model-image/ {
        proxy_pass http://modelmate_api;
        proxy_set_header Host $host;
    }

    # --- маркетинг + login + admin (React-SPA в образе api) ---
    location / {
        proxy_pass http://modelmate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
